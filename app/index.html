<!doctype html>
<html lang="zh-Hant">
  <head>

    <title>SCA 課後練習時段</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./js/student.mjs"></script>
  </head>
  <body>
    <header class="site-hero">
      <div class="hero-copy">
        <div class="brand-logo" aria-label="Alessandro 桑卓咖啡研究學院">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-wordmark" aria-hidden="true">
            <span class="brand-name-cn brand-line">
              <span>桑</span><span>卓</span><span>咖</span><span>啡</span><span>研</span><span>究</span><span>學</span><span>院</span>

        <h1>SCA 課後練習時段</h1>

          頁面顯示的可詢問名額不代表已完成預約。

    <main>
